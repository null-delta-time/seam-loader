name: Release

on:
  push:
    tags:
      - '*-v[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and update versions.json
        run: |
          TAG=${GITHUB_REF_NAME}
          PREFIX=${TAG%-v*}
          VERSION=${TAG#${PREFIX}-v}

          DIR=$(grep -rl "^tag=${PREFIX}$" --include='gradle.properties' . \
                | grep -v '^\./\.gradle' | head -1 | xargs dirname | sed 's|^\./||')
          [ -n "$DIR" ] || { echo "No subproject found with tag=${PREFIX}"; exit 1; }

          ./gradlew :${DIR}:jar -Pversion=${VERSION}
          ./gradlew :installer:jar -Pversion=${VERSION}

          ./gradlew updateVersionsJson -Pversion=${VERSION}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installer/src/main/resources/sh/ndt/seam/installer/versions.json
          git diff --cached --quiet || git commit -m "chore: update versions.json for $TAG"
          git push origin HEAD:refs/heads/main --follow-tags

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: |
            **/build/libs/*.jar
